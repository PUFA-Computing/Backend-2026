# ============================================================
# docker-compose.prod.yml — Production (Skenario A: Native DB)
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# Asumsi: PostgreSQL & Redis sudah berjalan native di OS server.
# Container app menggunakan --network host agar bisa akses
# localhost (127.0.0.1) PostgreSQL & Redis langsung.
#
# Setup server sebelum jalankan ini:
#   - sudo systemctl start postgresql redis-server
#   - Pastikan .env sudah berisi DB_HOST=127.0.0.1, REDIS_URL=127.0.0.1:6379
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-pufa-computing:latest
    container_name: api-computing
    restart: always
    # host network: container bisa akses localhost OS server
    # (PostgreSQL 5432, Redis 6379 yang berjalan native)
    network_mode: host
    env_file:
      - .env
    environment:
      GIN_MODE: release
      # Pastikan .env menggunakan nilai ini:
      # DB_HOST=127.0.0.1
      # DB_PORT=5432
      # REDIS_URL=127.0.0.1:6379
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
