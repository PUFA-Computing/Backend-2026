basePath: /api/v1
definitions:
  models.ApproveProjectRequest:
    properties:
      note:
        example: Project meets all quality standards
        type: string
    type: object
  models.CandidateResponse:
    properties:
      class:
        example: "2024"
        type: string
      created_at:
        example: "2025-11-12T03:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      major:
        example: informatics
        type: string
      mission:
        example: Serve all students equally
        type: string
      name:
        example: John Doe
        type: string
      profile_picture:
        example: https://example.com/image.jpg
        type: string
      updated_at:
        example: "2025-11-12T03:00:00Z"
        type: string
      user_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      vision:
        example: My vision for better education
        type: string
      vote_count:
        example: 5
        type: integer
    type: object
  models.CastVoteRequest:
    properties:
      candidate_id:
        example: 1
        type: integer
    required:
    - candidate_id
    type: object
  models.ProjectResponse:
    properties:
      approved_at:
        example: "2025-12-15T03:00:00Z"
        type: string
      approved_by:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      approved_by_name:
        example: Admin User
        type: string
      category:
        example: Website
        type: string
      created_at:
        example: "2025-12-14T03:00:00Z"
        type: string
      description:
        example: A detailed description of the project
        type: string
      id:
        example: 1
        type: integer
      image_url:
        example: https://example.com/image.jpg
        type: string
      is_published:
        example: true
        type: boolean
      project_url:
        example: https://github.com/user/project
        type: string
      rejection_reason:
        example: Does not meet quality standards
        type: string
      title:
        example: My Awesome Project
        type: string
      updated_at:
        example: "2025-12-14T03:00:00Z"
        type: string
      user_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      user_name:
        example: John Doe
        type: string
      vote_count:
        example: 5
        type: integer
    type: object
  models.RejectProjectRequest:
    properties:
      reason:
        example: Does not meet quality standards
        type: string
    required:
    - reason
    type: object
  models.User:
    properties:
      additional_notes:
        type: string
      created_at:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      email_verification_token:
        type: string
      email_verified:
        type: boolean
      file_path:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: string
      institution_name:
        type: string
      last_name:
        type: string
      major:
        type: string
      middle_name:
        type: string
      password:
        type: string
      password_reset_expires:
        type: string
      password_reset_token:
        type: string
      profile_picture:
        type: string
      role_id:
        type: integer
      student_id:
        type: string
      student_id_verification:
        type: string
      student_id_verified:
        type: boolean
      twofa_enabled:
        type: boolean
      twofa_image:
        type: string
      twofa_secret:
        type: string
      updated_at:
        type: string
      username:
        type: string
      year:
        type: string
    type: object
  models.VoteProjectRequest:
    type: object
host: localhost:8080
info:
  contact:
    email: support@pufacomputing.ac.id
    name: API Support
    url: https://compsci.president.ac.id/support
  description: Backend API for PUFA Computer Science with Projects, Candidates and
    Votes Management
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://compsci.president.ac.id/terms
  title: PUFA Backend API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: 'Login with username/email and password. Returns JWT token for
        authentication. Admin (role_id: 1) can create candidates. Computizen (role_id:
        2) with year 2025 can vote.'
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          properties:
            passcode:
              type: string
            password:
              type: string
            username:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Login successful with JWT token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials or email not verified
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the current user and invalidate the JWT token
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: 'Register a new user account. New users get Computizen role (role_id:
        2) by default. Only users with year 2025 can vote.'
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.User'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request or validation error
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - Auth
  /candidates:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all candidates with optional filters by
        major and class
      parameters:
      - description: Filter by major (information_system or informatics)
        in: query
        name: major
        type: string
      - description: Filter by class
        in: query
        name: class
        type: string
      - default: 1
        description: Page number for pagination
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of candidates" example({"success":true,"data":[{"id":1,"name":"John
            Doe","vision":"My vision","mission":"My mission","class":"2024","major":"informatics","profile_picture":"https://...","vote_count":5}],"totalResults":1,"totalPages":1})
          schema:
            additionalProperties: true
            type: object
      summary: List all candidates
      tags:
      - Candidates
  /candidates/{candidateID}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific candidate including vote
        count
      parameters:
      - description: Candidate ID
        in: path
        name: candidateID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Candidate details
          schema:
            properties:
              data:
                $ref: '#/definitions/models.CandidateResponse'
              message:
                type: string
              success:
                type: boolean
            type: object
        "400":
          description: Invalid candidate ID
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Candidate not found
          schema:
            additionalProperties: true
            type: object
      summary: Get candidate by ID
      tags:
      - Candidates
  /candidates/{candidateID}/delete:
    delete:
      consumes:
      - application/json
      description: 'Delete a candidate by ID. Requires Admin role (role_id: 1) and
        candidate:delete permission.'
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Candidate ID
        in: path
        name: candidateID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Candidate deleted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid candidate ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Candidate not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 'Delete a candidate (Admin only - role_id: 1)'
      tags:
      - Candidates
  /candidates/{candidateID}/edit:
    put:
      consumes:
      - multipart/form-data
      description: 'Update candidate information with optional profile picture upload.
        Requires Admin role (role_id: 1) and candidate:edit permission.'
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Candidate ID
        in: path
        name: candidateID
        required: true
        type: integer
      - description: Candidate data as JSON string
        example: '{"name":"John Doe","vision":"Updated vision","major":"informatics"}'
        in: formData
        name: data
        required: true
        type: string
      - description: New profile picture
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Candidate updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Candidate not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 'Update a candidate (Admin only - role_id: 1)'
      tags:
      - Candidates
  /candidates/create:
    post:
      consumes:
      - multipart/form-data
      description: 'Create a new candidate with profile picture upload. Requires Admin
        role (role_id: 1) and candidate:create permission.'
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Candidate data as JSON string
        example: '{"name":"John Doe","vision":"My vision","mission":"My mission","class":"2024","major":"informatics"}'
        in: formData
        name: data
        required: true
        type: string
      - description: Profile picture
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Candidate created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 'Create a new candidate (Admin only - role_id: 1)'
      tags:
      - Candidates
  /candidates/my-major:
    get:
      consumes:
      - application/json
      description: Get all candidates that the current user can vote for based on
        their major. Requires authentication.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of candidates for the user's major
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get candidates for my major
      tags:
      - Candidates
  /projects:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all published projects with optional filters
        by category. Each project includes team member information (project_members,
        linkedin_profiles, major, batch).
      parameters:
      - description: Filter by category (Website, AI, System, etc)
        in: query
        name: category
        type: string
      - default: 1
        description: Page number for pagination
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of projects with team information
          schema:
            additionalProperties: true
            type: object
      summary: List all projects
      tags:
      - Projects
  /projects/{projectID}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific project including team
        members, LinkedIn profiles, major, batch, and vote count
      parameters:
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Project details with team information
          schema:
            properties:
              data:
                $ref: '#/definitions/models.ProjectResponse'
              message:
                type: string
              success:
                type: boolean
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get project by ID
      tags:
      - Projects
  /projects/{projectID}/approve:
    put:
      consumes:
      - application/json
      description: Approve a pending project to make it published and visible to all
        users. Requires project:publish permission.
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      - description: Approval note (optional)
        in: body
        name: body
        schema:
          $ref: '#/definitions/models.ApproveProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Project approved successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid project ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Approve a project (Admin only)
      tags:
      - Projects
  /projects/{projectID}/delete:
    delete:
      consumes:
      - application/json
      description: Delete a project by ID. Only project owner or admin can delete.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Project deleted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid project ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Not project owner or admin
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a project
      tags:
      - Projects
  /projects/{projectID}/edit:
    put:
      consumes:
      - multipart/form-data
      description: Update project information with optional image upload. Only project
        owner can update.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      - description: Project data as JSON string
        example: '{"title":"Updated Title","description":"Updated description"}'
        in: formData
        name: data
        required: true
        type: string
      - description: New project image
        in: formData
        name: file
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Project updated successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Not project owner
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a project
      tags:
      - Projects
  /projects/{projectID}/publish:
    put:
      consumes:
      - application/json
      description: Publish a project to make it visible to all users. Requires project:publish
        permission.
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Project published successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid project ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Publish a project (Admin only)
      tags:
      - Projects
  /projects/{projectID}/reject:
    put:
      consumes:
      - application/json
      description: Reject a pending project with a reason. Requires project:publish
        permission.
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      - description: Rejection reason
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.RejectProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Project rejected successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid project ID or missing reason
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Reject a project (Admin only)
      tags:
      - Projects
  /projects/{projectID}/unvote:
    delete:
      consumes:
      - application/json
      description: Remove your vote from a project
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Vote removed successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request or haven't voted
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Remove vote from a project
      tags:
      - Project Votes
  /projects/{projectID}/vote:
    post:
      consumes:
      - application/json
      description: Vote for a published project with team member information. One
        vote per user per project.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      - description: Team member information
        in: body
        name: teamInfo
        required: true
        schema:
          $ref: '#/definitions/models.VoteProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Vote cast successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request, already voted, or project not published
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Project not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Vote for a project
      tags:
      - Project Votes
  /projects/{projectID}/votes/check:
    get:
      consumes:
      - application/json
      description: Check if the current authenticated user has voted for a specific
        project
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Vote status
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid project ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Check if user has voted for project
      tags:
      - Project Votes
  /projects/{projectID}/votes/count:
    get:
      consumes:
      - application/json
      description: Get the total number of votes for a specific project. No authentication
        required.
      parameters:
      - description: Project ID
        in: path
        name: projectID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Vote count
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid project ID
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get vote count for project (Public)
      tags:
      - Project Votes
  /projects/admin/all:
    get:
      consumes:
      - application/json
      description: Get all projects regardless of publication status with filters.
        Requires admin permission. Includes team member information for each project.
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by category
        in: query
        name: category
        type: string
      - description: Filter by publication status (true/false)
        in: query
        name: is_published
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of all projects with team information
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin access required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all projects (Admin only)
      tags:
      - Projects - Admin
  /projects/create:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Create a new project with team member information and image upload. Requires authentication. Project will be unpublished by default and requires admin approval.

        **Team Member Fields (Required):**
        - project_members: Array of team member names (1-10 members)
        - linkedin_profiles: Array of LinkedIn profile URLs (must match number of members)
        - major: Student major ('information_system' or 'informatics')
        - batch: Batch year (2021-2025)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Project data as JSON string
        example: '{"title":"My Awesome Project","description":"A detailed project
          description","category":"Website","project_url":"https://github.com/user/project","project_members":["John
          Doe","Jane Smith"],"linkedin_profiles":["https://linkedin.com/in/johndoe","https://linkedin.com/in/janesmith"],"major":"information_system","batch":2025}'
        in: formData
        name: data
        required: true
        type: string
      - description: Project image (JPG, PNG, max 5MB)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Project created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request - validation error or invalid team info
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a new project
      tags:
      - Projects
  /projects/my-projects:
    get:
      consumes:
      - application/json
      description: Get all projects created by the current authenticated user
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of user's projects
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get my projects
      tags:
      - Projects
  /projects/pending:
    get:
      consumes:
      - application/json
      description: Get all projects that are awaiting admin approval. Requires project:publish
        permission.
      parameters:
      - description: Bearer token (Admin only)
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of pending projects
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden - Admin role required
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get pending projects (Admin only)
      tags:
      - Projects
  /projects/votes/my-votes:
    get:
      consumes:
      - application/json
      description: Get all projects voted by the current authenticated user
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of user's votes
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get my project votes
      tags:
      - Project Votes
  /votes:
    get:
      consumes:
      - application/json
      description: Get a paginated list of all votes (requires vote:view permission)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Filter by candidate ID
        in: query
        name: candidate_id
        type: integer
      - default: 1
        description: Page number for pagination
        in: query
        name: page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of votes
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List all votes
      tags:
      - Votes
  /votes/{voteID}/delete:
    delete:
      consumes:
      - application/json
      description: Delete a vote by ID (requires vote:delete permission)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Vote ID
        in: path
        name: voteID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Vote deleted successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid vote ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a vote
      tags:
      - Votes
  /votes/can-vote:
    get:
      consumes:
      - application/json
      description: Check if the current user is eligible to vote (year must be 2025,
        hasn't voted yet, valid major)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Eligibility status
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Check if user can vote
      tags:
      - Votes
  /votes/candidate/{candidateID}:
    get:
      consumes:
      - application/json
      description: Get all votes for a specific candidate (requires vote:view permission)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: Candidate ID
        in: path
        name: candidateID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of votes for the candidate
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid candidate ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get votes by candidate
      tags:
      - Votes
  /votes/candidate/{candidateID}/count:
    get:
      consumes:
      - application/json
      description: Get the total number of votes for a specific candidate. No authentication
        required.
      parameters:
      - description: Candidate ID
        in: path
        name: candidateID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Vote count
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid candidate ID
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Get vote count for candidate (Public)
      tags:
      - Votes
  /votes/cast:
    post:
      consumes:
      - application/json
      description: Cast a vote for a candidate. Any user with year 2025 can vote once
        for a candidate from their major. One vote per user, same major required.
      parameters:
      - description: Bearer token (Year 2025 user)
        in: header
        name: Authorization
        required: true
        type: string
      - description: Vote request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CastVoteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Vote cast successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request, already voted, not year 2025, or different major
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Cast a vote (Year 2025 users only)
      tags:
      - Votes
  /votes/my-vote:
    get:
      consumes:
      - application/json
      description: Get the current user's vote details
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User's vote details
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Vote not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get my vote
      tags:
      - Votes
  /votes/status:
    get:
      consumes:
      - application/json
      description: Check if the current user has already voted
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Vote status
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Check vote status
      tags:
      - Votes
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
tags:
- description: Authentication endpoints
  name: Auth
- description: Project management endpoints
  name: Projects
- description: Project voting endpoints
  name: Project Votes
- description: Candidate management endpoints
  name: Candidates
- description: Candidate voting endpoints
  name: Votes
