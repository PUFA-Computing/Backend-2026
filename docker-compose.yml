# ============================================================
# docker-compose.yml — Quick Reference / Entrypoint
#
# Pilih file yang sesuai dengan kebutuhan:
#
# DEVELOPMENT (hot-reload + postgres + redis exposed ke host):
#   docker compose -f docker-compose.dev.yml up --build
#
# PRODUCTION (compiled binary, DB tidak exposed ke luar):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Pastikan file .env sudah ada sebelum menjalankan compose.
# Contoh: cp .env.example .env && nano .env
# ============================================================
