swagger: "2.0"
info:
    title: PUMA Computing API
    description: PUMA Computing API
    version: 0.1.0
consumes:
    - application/json
produces:
    - application/json
schemes:
    - http
paths:
    /auth/login:
        post:
            tags:
                - auth
            summary: Login Endpoint
            description: Request login to the system
            operationId: authLogin
            parameters:
              - name: LoginRequest
                in: body
                description: The user email and password for login
                required: true
                schema:
                  type: object
                  properties:
                    email:
                      type: string
                    password:
                      type: string
            responses:
                '200':
                    description: Login successful
                    headers:
                        X-Expires-After:
                            description: date in UTC when token expires
                            type: string
                            format: date-time

                '400':
                    description: Error parsing login data
                '401':
                    description: Unauthorized
                '500':
                    description: Error generating session token
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /auth/register:
        post:
            tags:
                - auth
            summary: Registering user
            description: creating a new user
            operationId: authRegister
            parameters:
              - name: RegisterRequest
                in: body
                description: The user details
                required: true
                schema:
                  type: object
                  properties:
                    first_name:
                      type: string
                    last_name:
                      type: string
                    email:
                      type: string
                    password:
                      type: string
                    nim:
                      type: string
                    year:
                      type: string
            responses:
                '200':
                    description: successful operation
                '400':
                    description: Invalid data request
                '500':
                    description: Error creating user
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /auth/logout:
        post:
            tags:
                - auth
            summary: Logout Endpoint
            description: Request logout from the system
            operationId: authLogout
            responses:
                '200':
                    description: Logout successful
                '401':
                    description: Unauthorized
                '500':
                    description: Error generating session token
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /event/:
        get:
            tags:
                - event
            summary: Returns all events
            description: Returns a list of all events
            operationId: getAllEvent
            responses:
                '200':
                    description: successful operation
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/Event'
                '500':
                    description: error retrieving events
    /event/{eventId}:
        get:
            tags:
                - event
            summary: Get event by eventID
            description: For valid response use int64 for eventID
            operationId: getEventByID
            parameters:
                - name: eventId
                  in: path
                  description: ID of order that needs to be fetched
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/Event'
                '500':
                    description: Error retrieving event by ID
    /event/{eventId}/register:
        post:
            tags:
                - event
            summary: Register User to the event
            description: For valid response use int64 for eventID
            operationId: registerUsersToEvent
            parameters:
                - name: eventId
                  in: path
                  description: ID of order that needs to be fetched
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/Event'
                '500':
                    description: Error retrieving event by ID
    /event/create:
        post:
            tags:
                - event
            summary: Create new event
            description: fill the value of the parameter
            operationId: createEvent
            parameters:
              - name: EventRequest
                in: body
                description: The event details
                required: true
                schema:
                  $ref: '#/definitions/Event'
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/Event'
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Access Denied
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /event/{eventId}/edit:
        put:
            tags:
                - event
            summary: Edit existing event
            description: update the value of the parameter
            operationId: editEvent
            parameters:
              - name: eventId
                in: path
                description: ID of order that needs to be fetched
                required: true
                type: integer
                format: int64
              - name: EventRequest
                in: body
                description: The event details
                required: true
                schema:
                  $ref: '#/definitions/Event'
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/Event'
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Access Denied
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /event/{eventId}/delete:
        delete:
            tags:
                - event
            summary: Delete event
            description: Delete the event
            operationId: deleteEvent
            parameters:
                - name: eventId
                  in: path
                  description: ID of order that needs to be fetched
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                '400':
                    description: Invalid input
                '500':
                    description: Error retrieving event by ID
    /news/:
        get:
            tags:
                - news
            summary: Returns all news
            description: Returns a list of all news
            operationId: getAllNews
            responses:
                '200':
                    description: successful operation
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/News'
                '500':
                    description: error retrieving news
    /news/{newsId}:
        get:
            tags:
                - news
            summary: Get news by newsID
            description: For valid response use int64 for newsID
            operationId: getNewsByID
            parameters:
              - name: newsId
                in: path
                description: ID of order that needs to be fetched
                required: true
                type: integer
                format: int64
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/News'
                '500':
                    description: Error retrieving news by ID
    /news/create:
        post:
            tags:
                - news
            summary: Create new news
            description: fill the value of the parameter
            operationId: createNews
            parameters:
              - name: NewsRequest
                in: body
                description: The news details
                required: true
                schema:
                  $ref: '#/definitions/News'
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/News'
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Access Denied
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /news/{newsId}/edit:
        put:
            tags:
                - news
            summary: Edit existing news
            description: update the value of the parameter
            operationId: editNews
            parameters:
              - name: newsId
                in: path
                description: ID of order that needs to be fetched
                required: true
                type: integer
                format: int64
              - name: NewsRequest
                in: body
                description: The news details
                required: true
                schema:
                  $ref: '#/definitions/News'
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/News'
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Access Denied
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /news/{newsId}/delete:
        delete:
            tags:
                - news
            summary: Delete News
            description: Delete the News
            operationId: deleteNews
            parameters:
                - name: newsId
                  in: path
                  description: ID of order that needs to be fetched
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                '400':
                    description: Invalid input
                '500':
                    description: Error retrieving News by ID
    /projects/:
        get:
            tags:
                - projects
            summary: Returns all published projects
            description: Returns a paginated list of all published projects with optional category filter
            operationId: getAllProjects
            parameters:
              - name: category
                in: query
                description: Filter by category (Website, AI, System, etc)
                required: false
                type: string
              - name: page
                in: query
                description: Page number for pagination
                required: false
                type: integer
            responses:
                '200':
                    description: successful operation
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/Project'
                '500':
                    description: error retrieving projects
    /projects/{projectId}:
        get:
            tags:
                - projects
            summary: Get project by projectID
            description: Get detailed information about a specific project including vote count
            operationId: getProjectByID
            parameters:
                - name: projectId
                  in: path
                  description: ID of project to fetch
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                    schema:
                        $ref: '#/definitions/Project'
                '404':
                    description: Project not found
                '500':
                    description: Error retrieving project by ID
    /projects/create:
        post:
            tags:
                - projects
            summary: Create new project
            description: Create a new project with image upload (requires authentication)
            operationId: createProject
            consumes:
                - multipart/form-data
            parameters:
              - name: data
                in: formData
                description: Project data as JSON string
                required: true
                type: string
              - name: file
                in: formData
                description: Project image file
                required: true
                type: file
            responses:
                '201':
                    description: Project created successfully
                    schema:
                        $ref: '#/definitions/Project'
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/{projectId}/edit:
        put:
            tags:
                - projects
            summary: Update existing project
            description: Update project information (only owner can update)
            operationId: updateProject
            consumes:
                - multipart/form-data
            parameters:
              - name: projectId
                in: path
                description: ID of project to update
                required: true
                type: integer
                format: int64
              - name: data
                in: formData
                description: Project data as JSON string
                required: true
                type: string
              - name: file
                in: formData
                description: New project image file
                required: false
                type: file
            responses:
                '200':
                    description: Project updated successfully
                    schema:
                        $ref: '#/definitions/Project'
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Forbidden - Not project owner
                '404':
                    description: Project not found
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/{projectId}/delete:
        delete:
            tags:
                - projects
            summary: Delete project
            description: Delete a project (only owner or admin can delete)
            operationId: deleteProject
            parameters:
                - name: projectId
                  in: path
                  description: ID of project to delete
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: Project deleted successfully
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Forbidden - Not project owner or admin
                '404':
                    description: Project not found
                '500':
                    description: Error deleting project
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/{projectId}/publish:
        put:
            tags:
                - projects
            summary: Publish project (Admin only)
            description: Publish a project to make it visible to all users
            operationId: publishProject
            parameters:
                - name: projectId
                  in: path
                  description: ID of project to publish
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: Project published successfully
                '400':
                    description: Invalid input
                '401':
                    description: Unauthorized
                '403':
                    description: Forbidden - Admin role required
                '404':
                    description: Project not found
                '500':
                    description: Error publishing project
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/my-projects:
        get:
            tags:
                - projects
            summary: Get my projects
            description: Get all projects created by the current authenticated user
            operationId: getMyProjects
            responses:
                '200':
                    description: successful operation
                    schema:
                        type: array
                        items:
                            $ref: '#/definitions/Project'
                '401':
                    description: Unauthorized
                '500':
                    description: Error retrieving projects
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/{projectId}/vote:
        post:
            tags:
                - project_votes
            summary: Vote for a project
            description: Cast a vote for a published project (one vote per user per project)
            operationId: voteProject
            parameters:
                - name: projectId
                  in: path
                  description: ID of project to vote for
                  required: true
                  type: integer
                  format: int64
            responses:
                '201':
                    description: Vote cast successfully
                '400':
                    description: Already voted or project not published
                '401':
                    description: Unauthorized
                '404':
                    description: Project not found
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/{projectId}/unvote:
        delete:
            tags:
                - project_votes
            summary: Remove vote from project
            description: Remove your vote from a project
            operationId: unvoteProject
            parameters:
                - name: projectId
                  in: path
                  description: ID of project to unvote
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: Vote removed successfully
                '400':
                    description: Haven't voted for this project
                '401':
                    description: Unauthorized
                '404':
                    description: Project not found
                '500':
                    description: Internal Server Error
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/{projectId}/votes/count:
        get:
            tags:
                - project_votes
            summary: Get vote count for project
            description: Get the total number of votes for a specific project (public endpoint)
            operationId: getProjectVoteCount
            parameters:
                - name: projectId
                  in: path
                  description: ID of project
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                '400':
                    description: Invalid project ID
                '500':
                    description: Error retrieving vote count
    /projects/{projectId}/votes/check:
        get:
            tags:
                - project_votes
            summary: Check if user has voted for project
            description: Check if the current authenticated user has voted for a specific project
            operationId: checkHasVoted
            parameters:
                - name: projectId
                  in: path
                  description: ID of project
                  required: true
                  type: integer
                  format: int64
            responses:
                '200':
                    description: successful operation
                '400':
                    description: Invalid project ID
                '401':
                    description: Unauthorized
                '500':
                    description: Error checking vote status
            security:
                - computing_auth:
                      - write:content
                      - read:content
    /projects/votes/my-votes:
        get:
            tags:
                - project_votes
            summary: Get my project votes
            description: Get all projects voted by the current authenticated user
            operationId: getMyProjectVotes
            responses:
                '200':
                    description: successful operation
                '401':
                    description: Unauthorized
                '500':
                    description: Error retrieving votes
            security:
                - computing_auth:
                      - write:content
                      - read:content
definitions:
    User:
        type: object
        properties:
            id:
                type: integer
                format: int64
                readOnly: true
            first_name:
                type: string
            last_name:
                type: string
            email:
                type: string
            password:
                type: string
            role:
                type: string
            nim:
                type: string
            year:
                type: string
        xml:
            name: User
    Event:
        type: object
        properties:
            id:
                type: integer
                format: int64
                readOnly: true
            image:
                type: string
            name:
                type: string
            description:
                type: string
            date:
                type: string
                format: date-time
            registered_users:
                type: array
                items:
                    type: string
                    format: uuid
        xml:
            name: Event
    News:
        type: object
        properties:
            id:
                type: integer
                format: int64
                readOnly: true
            authorID:
                type: string
                format: uuid
            title:
                type: string
            content:
                type: string
            categories:
                type: array
                items:
                    type: string
            thumbnail:
                type: string
            visible:
                type: boolean
            published_date:
                type: string
                format: date-time
        xml:
            name: News    Project:
        type: object
        properties:
            id:
                type: integer
                format: int64
                readOnly: true
            user_id:
                type: string
                format: uuid
            user_name:
                type: string
            title:
                type: string
            description:
                type: string
            category:
                type: string
            project_url:
                type: string
            image_url:
                type: string
            is_published:
                type: boolean
            vote_count:
                type: integer
            created_at:
                type: string
                format: date-time
            updated_at:
                type: string
                format: date-time
        xml:
            name: Project
