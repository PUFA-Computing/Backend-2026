# ============================================================
# docker-compose.dev.yml — Development Stack (Lightweight)
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# - App: hot-reload via Air (source code mounted as volume)
# - PostgreSQL & Redis: NOT started locally — connect to remote server via .env
# ============================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      # Mount source code for hot-reload
      - .:/app
      # Preserve downloaded Go modules cache
      - go_mod_cache:/go/pkg/mod
    extra_hosts:
      # Allow container to reach host machine (useful for local tools)
      - "host.docker.internal:host-gateway"
    networks:
      - pufa_dev_network

networks:
  pufa_dev_network:
    name: pufa_dev_network
    driver: bridge

volumes:
  go_mod_cache:
